services:
    mongodb:
        image: mongo:7
        container_name: helpdesk-mongodb
        restart: unless-stopped
        volumes:
            - mongodb_data:/data/db
        networks:
            - helpdesk-network

    mysql:
        image: mysql:8.0
        container_name: helpdesk-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: helpdesk
            MYSQL_ROOT_PASSWORD: root_password_change_me
            MYSQL_USER: helpdesk_user
            MYSQL_PASSWORD: helpdesk_password_change_me
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - helpdesk-network
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
            interval: 10s
            timeout: 5s
            retries: 5

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        links:
            - mysql:db
        ports:
            - 8080:80
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
            PMA_USER: '${DB_USERNAME}'
            PMA_PASSWORD: '${DB_PASSWORD}'
            UPLOAD_LIMIT: 64M
        networks:
            - helpdesk-network
        depends_on:
            - mysql

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: helpdesk-backend
        restart: unless-stopped
        environment:
            APP_NAME: HelpDesk
            APP_ENV: production
            APP_DEBUG: "false"
            APP_URL: https://localhost
            DB_CONNECTION: mysql
            DB_HOST: ${DB_HOST}
            DB_PORT: ${DB_PORT:-3306}
            DB_DATABASE: ${DB_DATABASE:-helpdesk}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            SESSION_DRIVER: file
            CACHE_DRIVER: file
            QUEUE_CONNECTION: sync
            CLAUDIA_WEBHOOK_SECRET: ${CLAUDIA_WEBHOOK_SECRET}
            HELPDESK_DEFAULT_TENANT_ID: ${HELPDESK_DEFAULT_TENANT_ID:-1}
        # ports:
        #     - "8000:80"
        depends_on:
            mysql:
                condition: service_healthy
        volumes:
            - ./backend:/var/www/html
            # - ./backend/storage:/var/www/html/storage
        networks:
            - helpdesk-network

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                VITE_API_URL: /api
        container_name: helpdesk-frontend
        restart: unless-stopped
        ports:
            - "3000:80"
        depends_on:
            - backend
        networks:
            - helpdesk-network

    claudia:
        build:
            context: ./claud-ia
            dockerfile: Dockerfile
        container_name: helpdesk-claudia
        restart: unless-stopped
        ports:
            - "3001:3000"
        environment:
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            AUTH_SECRET: ${AUTH_SECRET}
            SETTINGS_USERNAME: ${SETTINGS_USERNAME}
            SETTINGS_PASSWORD: ${SETTINGS_PASSWORD}
            MONGODB_URI: mongodb://helpdesk-mongodb:27017/claudia
            CLAUDIA_WEBHOOK_SECRET: ${CLAUDIA_WEBHOOK_SECRET}
            HELPDESK_API_URL: http://backend/api
        volumes:
            - ./claud-ia/data:/app/data
        depends_on:
            - mongodb
        networks:
            - helpdesk-network

    proxy:
        image: nginx:alpine
        container_name: helpdesk-proxy
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./proxy/certs:/etc/nginx/certs:ro
        depends_on:
            - frontend
            - backend
            - claudia
        networks:
            - helpdesk-network

volumes:
    mysql_data:
        driver: local
    mongodb_data:
        driver: local

networks:
    helpdesk-network:
        driver: bridge
